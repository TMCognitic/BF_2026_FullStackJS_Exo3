<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/site.css" rel="stylesheet" />
    <script src="./scripts/site.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div>
        <div>
            <h1>Calculatrice Simple</h1>
        </div>
        <div>
            <div>
                <label for="nb1">Nombre 1 :</label>
                <input type="number" id="nb1" />
            </div>
            <div>
                <label for="nb2">Nombre 2 :</label>
                <input type="number" id="nb2" />
            </div>
        </div>
        <div>
            <button id="btnAddition">+</button>
            <button id="btnSoustraction">-</button>
            <button id="btnMultiplication">*</button>
            <button id="btnDivision">/</button>
        </div>
        <div>
            <div>
                <label for="resultat">Nombre 2 :</label>
                <input id="resultat" disabled />
            </div>
        </div>
    </div>

    <div>
        <div>
            <h1>Calculatrice Simple</h1>
        </div>
        <div>
            <div>
                <label for="nb1">Nombre 1 :</label>
                <input type="number" id="nb1Advance" />
            </div>
            <div>
                <label for="nb2">Nombre 2 :</label>
                <input type="number" id="nb2Advance" />
            </div>
        </div>
        <div>
            <button id="btnAddition2">+</button>
            <button id="btnSoustraction2">-</button>
            <button id="btnMultiplication2">*</button>
            <button id="btnPuissance">^</button>
        </div>
        <div>
            <button id="btnRacine" onclick="racine()">√</button>
            <button id="btnDivision2">/</button>
            <button id="btnDivEntiere">DIV</button>
            <button id="btnModulo">%</button>
        </div>
    </div>
</body>
</html>
